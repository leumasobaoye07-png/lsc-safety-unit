function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function subscribeToPush(userId) {
  try {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) return null;
    const reg = await navigator.serviceWorker.ready;
    const permission = await Notification.requestPermission();
    if (permission !== "granted") return null;
    const existing = await reg.pushManager.getSubscription();
    if (existing) { await savePushSubscription(userId, existing); return existing; }
    const subscription = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)

    await savePushSubscription(userId, subscription);
    return subscription;
  } catch (e) { console.warn("Push subscription failed:", e); return null; }
}

async function hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

const ORD = n => { const s = ["th","st","nd","rd"], v = n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
const MON = m => ["January","February","March","April","May","June","July","August","September","October","November","December"][m];

function getSundaysInQ(qs, yr) {
  const out = [];
  for (let m = qs; m < qs + 3; m++) {
    const d = new Date(yr, m, 1);
    while (d.getDay() !== 0) d.setDate(d.getDate() + 1);
    while (d.getMonth() === m) { out.push({ dateNum: d.getDate(), month: m, year: yr }); d.setDate(d.getDate() + 7); }
  }
  return out;
}

function seededShuffle(arr, seed) {
  const a = [...arr]; let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function genQuarter(label, qs, yr) {
  const sundays = getSundaysInQ(qs, yr);
  const ids = seededShuffle(TEAM_CONFIG.map(t => t.id), yr * 100 + qs + 7);
  const mmap = {};
  sundays.forEach(s => { if (!mmap[s.month]) mmap[s.month] = []; mmap[s.month].push(s); });
  return {
    quarter: label,
    months: Object.entries(mmap).map(([mk, days]) => ({
      label: `${MON(+mk)} ${yr}`,
      sundays: days.map((s, si) => {
        const p = n => ids[(si * 5 + n) % ids.length];
        return {
          date: `Sunday ${ORD(s.dateNum)} ${MON(s.month)}`, dateNum: s.dateNum, month: s.month, year: s.year,
          slots: { "gate-early": [[p(0), p(1)]], "camera-early": [[p(2)], [p(3)]], "gate-late": [[p(4), p(5)]], "camera-late": [[p(6)], [p(7)]], "patrol": [[p(8)]] }
        };
      })
    }))
  };
}

// ─── ERROR BOUNDARY ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(e) { return { hasError: true, error: e }; }
  render() {
    if (this.state.hasError) return (
      <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "Georgia, serif", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
        <div style={{ fontSize: 16, fontWeight: "bold", color: C.red, marginBottom: 8 }}>App encountered an error</div>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 20, maxWidth: 360 }}>{this.state.error?.message || "Unknown error"}</div>
        <button onClick={() => window.location.reload()} style={{ background: "#1e1608", border: `1px solid ${C.gold}`, color: C.gold, padding: "10px 24px", borderRadius: 9, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 13 }}>Reload App</button>
      </div>
    );
    return this.props.children;
  }
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function MainApp() {
  // Auth
  const [members, setMembers] = useState([]);
  const [loggedIn, setLoggedIn] = useState(null);
  const [loginStep, setLoginStep] = useState("select");
  const [selectedMember, setSelectedMember] = useState(null);
  const [appLoading, setAppLoading] = useState(true);
  const [loadMsg, setLoadMsg] = useState("Loading...");
  const [seeding, setSeeding] = useState(false);

  // Data state
  const [clockedIn, setClockedIn] = useState({});   // memberId -> event row
  const [clockEvents, setClockEvents] = useState([]);
  const [incidents, setIncidents] = useState([]);
  const [messages, setMessages] = useState([]);
  const [announcements, setAnnouncements] = useState([]);
  const [emergencyAlert, setEmergencyAlert] = useState(null);
  const [coverRequests, setCoverRequests] = useState([]);
  const [specialEvents, setSpecialEvents] = useState([]);
  const [absenceNotes, setAbsenceNotes] = useState({});

  // UI
  const [tab, setTab] = useState("home");
  const [currentTime, setCurrentTime] = useState(new Date());
  const [rosterQ, setRosterQ] = useState("Q1-2025");
  const [rosterMonth, setRosterMonth] = useState(0);
  const [reportData, setReportData] = useState(null);
  const [netError, setNetError] = useState(null);

  // Modals
  const [clockRoleModal, setClockRoleModal] = useState(false);
  const [selectedRole, setSelectedRole] = useState("gate-early");
  const [adminClockModal, setAdminClockModal] = useState(null);
  const [absenceModal, setAbsenceModal] = useState(null);
  const [changePinModal, setChangePinModal] = useState(false);
  const [emergencyModal, setEmergencyModal] = useState(false);
  const [specialModal, setSpecialModal] = useState(false);
  const [profileModal, setProfileModal] = useState(null);
  const [coverModal, setCoverModal] = useState(false);

  // Forms
  const [incidentForm, setIncidentForm] = useState({ reporter: "", location: "", type: "", description: "" });
  const [msgText, setMsgText] = useState("");
  const [announcementText, setAnnouncementText] = useState("");
  const [newPin, setNewPin] = useState(""); const [pinConfirm, setPinConfirm] = useState(""); const [pinMsg, setPinMsg] = useState("");
  const [absenceForm, setAbsenceForm] = useState({ type: "excused", note: "" });
  const [emergencyMsg, setEmergencyMsg] = useState("");
  const [specialForm, setSpecialForm] = useState({ title: "", date: "", time: "", description: "", assigned: [] });
  const [coverForm, setCoverForm] = useState({ reason: "" });

  const audioCtx = useRef(null);
  const msgEndRef = useRef(null);
  const realtimeRef = useRef(null);
  const emergencyTimerRef = useRef(null);

  // Demo mode state mirrors
  const [demoClockEvents, setDemoClockEvents] = useState([]);
  const [demoIncidents, setDemoIncidents] = useState([]);
  const [demoMessages, setDemoMessages] = useState([{ id: 1, sender_id: "S", sender_name: "Samuel", text: "Welcome to the team chat. God bless your service. 🙏", timestamp: new Date(Date.now() - 3600000).toISOString() }]);
  const [demoAnnouncements, setDemoAnnouncements] = useState([{ id: 1, text: "Welcome to The Living Shield LSC Abuja Safety Unit. May God guide your watch.", author: "Admin", timestamp: new Date().toISOString() }]);
  const [demoCoverRequests, setDemoCoverRequests] = useState([]);
  const [demoSpecialEvents, setDemoSpecialEvents] = useState([]);

  useEffect(() => { msgEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, demoMessages]);

  // ── LOAD & INIT ──
  useEffect(() => {
    initApp();
    const timer = setInterval(() => {
      setCurrentTime(new Date());
      const n = new Date();
      if (n.getDay() === 0 && n.getHours() === 14 && n.getMinutes() === 0 && n.getSeconds() < 5) buildReport();
    }, 1000);
    const n = new Date(); const m = n.getMonth(); const y = n.getFullYear();
    const qm = { 0:"Q1",1:"Q1",2:"Q1",3:"Q2",4:"Q2",5:"Q2",6:"Q3",7:"Q3",8:"Q3",9:"Q4",10:"Q4",11:"Q4" };
    const qk = `${qm[m]}-${y}`; if (QUARTERS[qk]) { setRosterQ(qk); setRosterMonth(0); }
    return () => { clearInterval(timer); if (realtimeRef.current) realtimeRef.current.unsubscribe(); if (emergencyTimerRef.current) clearTimeout(emergencyTimerRef.current); };
  }, []);

  async function initApp() {
    setLoadMsg("Connecting...");
    if (IS_DEMO) {
      setMembers(TEAM_CONFIG.map(m => ({ ...m, pin_hash: "demo" })));
      setAppLoading(false);
      return;
    }
    try {
      setLoadMsg("Loading team members...");
      const db = await sb.from("members");
      const { data, error } = await db.select();
      if (error) throw new Error("Cannot reach server");
      if (!data || data.length === 0) {
        setMembers([]);
        setAppLoading(false);
        return;
      }
      setMembers(data);
      await loadAllData();
      setupRealtime();
      setAppLoading(false);
    } catch (e) {
      setNetError(e.message);
      setAppLoading(false);
    }
  }

  async function loadAllData() {
    try {
      const db_clock = await sb.from("clock_events");
      const { data: ce } = await db_clock.select("*", { order: "timestamp.desc", limit: 500 });
      if (ce) {
        setClockEvents(ce);
        // Build clockedIn from today's events
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const todayEvents = ce.filter(e => new Date(e.timestamp) >= today);
        const ci = {};
        todayEvents.forEach(e => {
          if (e.action === "Clock In") ci[e.member_id] = e;
          if (e.action === "Clock Out") delete ci[e.member_id];
        });
        setClockedIn(ci);
      }

      const db_inc = await sb.from("incidents");
      const { data: inc } = await db_inc.select("*", { order: "timestamp.desc" });
      if (inc) setIncidents(inc);

      const db_msg = await sb.from("messages");
      const { data: msgs } = await db_msg.select("*", { order: "timestamp.asc", limit: 200 });
      if (msgs) setMessages(msgs);

      const db_ann = await sb.from("announcements");
      const { data: ann } = await db_ann.select("*", { order: "timestamp.desc" });
      if (ann) setAnnouncements(ann);

      const db_em = await sb.from("emergency_alerts");
      const { data: em } = await db_em.select("*", { filter: "active=eq.true", order: "timestamp.desc", limit: 1 });
      if (em && em.length > 0) setEmergencyAlert(em[0]);

      const db_cv = await sb.from("cover_requests");
      const { data: cv } = await db_cv.select("*", { order: "timestamp.desc" });
      if (cv) setCoverRequests(cv);

      const db_se = await sb.from("special_events");
      const { data: se } = await db_se.select("*", { order: "event_date.asc" });
      if (se) setSpecialEvents(se);

      const db_ab = await sb.from("absence_notes");
      const { data: ab } = await db_ab.select("*");
      if (ab) {
        const abMap = {};
        ab.forEach(a => { abMap[a.member_id] = a; });
        setAbsenceNotes(abMap);
      }
    } catch (e) {
      console.error("Data load error:", e);
    }
  }

  function setupRealtime() {
    const ch = sb.channel("public:all");
    ch.on("INSERT", "public", "messages", payload => {
      setMessages(prev => [...prev, payload.new]);
    });
    ch.on("INSERT", "public", "clock_events", payload => {
      const e = payload.new;
      setClockEvents(prev => [e, ...prev]);
      if (e.action === "Clock In") setClockedIn(prev => ({ ...prev, [e.member_id]: e }));
      if (e.action === "Clock Out") setClockedIn(prev => { const c = { ...prev }; delete c[e.member_id]; return c; });
    });
    ch.on("INSERT", "public", "emergency_alerts", payload => {
      setEmergencyAlert(payload.new);
      playAlarm();
      if (emergencyTimerRef.current) clearTimeout(emergencyTimerRef.current);
      emergencyTimerRef.current = setTimeout(() => setEmergencyAlert(null), 30000);
    });
    ch.on("UPDATE", "public", "emergency_alerts", payload => {
      if (!payload.new.active) setEmergencyAlert(null);
    });
    ch.on("INSERT", "public", "announcements", payload => {
      setAnnouncements(prev => [payload.new, ...prev]);
    });
    ch.on("INSERT", "public", "cover_requests", payload => {
      setCoverRequests(prev => [payload.new, ...prev]);
    });
    ch.on("UPDATE", "public", "cover_requests", payload => {
      setCoverRequests(prev => prev.map(c => c.id === payload.new.id ? payload.new : c));
    });
    ch.subscribe();
    realtimeRef.current = ch;
  }

  // ── ALARM ──
  const playAlarm = useCallback(() => {
    try {
      if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx.current;
      [0, 0.3, 0.6, 0.9, 1.2, 1.5].forEach(t => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = "square"; osc.frequency.setValueAtTime(1040, ctx.currentTime + t);
        osc.frequency.setValueAtTime(700, ctx.currentTime + t + 0.15);
        gain.gain.setValueAtTime(0.5, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.28);
        osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.3);
      });
    } catch (e) {}
    // Vibrate only on Android (iOS Safari doesn't support it)
    if (!isIOS() && navigator.vibrate) navigator.vibrate([400, 100, 400, 100, 400, 100, 600]);
  }, []);

  // ── SEED MEMBERS ──
  async function seedMembers() {
    setSeeding(true);
    try {
      const db = await sb.from("members");
      for (const m of TEAM_CONFIG) {
        const hash = await hashPin(m.defaultPin);
        await db.insert({ id: m.id, name: m.name, pin_hash: hash, role: m.role });
      }
      const { data } = await (await sb.from("members")).select();
      setMembers(data || []);
      // Seed welcome message
      await (await sb.from("announcements")).insert({ text: "Welcome to The Living Shield LSC Abuja Safety Unit. May God guide your watch. 🙏", author: "Admin" });
    } catch (e) {
      console.error("Seed error:", e);
    }
    setSeeding(false);
  }

  // ── CLOCK IN/OUT ──
  async function doClockIn(memberId, roleId) {
    const role = DUTY_ROLES.find(r => r.id === roleId);
    const member = getMember(memberId);
    const row = { member_id: memberId, member_name: member?.name, action: "Clock In", role_id: roleId, role_label: role?.label, duty_label: duty.label };
    if (IS_DEMO) {
      const e = { ...row, id: Date.now(), timestamp: new Date().toISOString() };
      setDemoClockEvents(prev => [e, ...prev]);
      setClockedIn(prev => ({ ...prev, [memberId]: e }));
    } else {
      try {
        const { data } = await (await sb.from("clock_events")).insert(row);
        if (data?.[0]) setClockedIn(prev => ({ ...prev, [memberId]: data[0] }));
      } catch (e) { setNetError("Clock-in failed. Check connection."); }
    }
  }

  async function doClockOut(memberId) {
    const entry = clockedIn[memberId];
    const member = getMember(memberId);
    const row = { member_id: memberId, member_name: member?.name, action: "Clock Out", role_id: entry?.role_id, role_label: entry?.role_label, duty_label: entry?.duty_label };
    if (IS_DEMO) {
      setDemoClockEvents(prev => [{ ...row, id: Date.now(), timestamp: new Date().toISOString() }, ...prev]);
      setClockedIn(prev => { const c = { ...prev }; delete c[memberId]; return c; });
    } else {
      try {
        await (await sb.from("clock_events")).insert(row);
        setClockedIn(prev => { const c = { ...prev }; delete c[memberId]; return c; });
      } catch (e) { setNetError("Clock-out failed. Check connection."); }
    }
  }

  // ── REPORT ──
  const buildReport = useCallback(() => {
    const todayEntry = findTodayRoster();
    if (!todayEntry) return;
    const allEvents = IS_DEMO ? demoClockEvents : clockEvents;
    const allIncidents = IS_DEMO ? demoIncidents : incidents;
    const scheduled = new Set();
    Object.values(todayEntry.slots).forEach(pairs => pairs.forEach(pair => pair.forEach(id => scheduled.add(id))));
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const todayClockIns = allEvents.filter(e => e.action === "Clock In" && new Date(e.timestamp) >= today);
    const todayClockOuts = allEvents.filter(e => e.action === "Clock Out" && new Date(e.timestamp) >= today);
    const rows = TEAM_CONFIG.map(member => {
      const ins = todayClockIns.filter(e => e.member_id === member.id);
      const outs = todayClockOuts.filter(e => e.member_id === member.id);
      const wasScheduled = scheduled.has(member.id);
      const didIn = ins.length > 0;
      const duties = getMemberDuties(member.id, todayEntry);
      const ab = absenceNotes[member.id];
      const status = !wasScheduled && !didIn ? null : didIn ? "PRESENT" : ab?.type === "excused" ? "EXCUSED" : "ABSENT";
      return { ...member, wasScheduled, didIn, clockInTime: ins[0]?.timestamp || null, clockOutTime: outs[0]?.timestamp || null, roleLabel: ins[0]?.role_label || duties[0]?.label || "—", status, absenceNote: ab?.note || "" };
    }).filter(m => m.status !== null);
    const allInc = allIncidents.filter(i => new Date(i.timestamp) >= today);
    setReportData({ dateLabel: todayStr(), rows, incidents: allInc, generated: new Date().toISOString() });
  }, [clockEvents, demoClockEvents, incidents, demoIncidents, absenceNotes]);

  // ── MEMBER STATS ──
  const getMemberStats = useCallback(memberId => {
    const allEvents = IS_DEMO ? demoClockEvents : clockEvents;
    const allSundays = Object.values(QUARTERS).flatMap(q => q.months.flatMap(m => m.sundays));
    const scheduled = allSundays.filter(s => Object.values(s.slots).some(pairs => pairs.some(pair => pair.includes(memberId)))).length;
    const present = allEvents.filter(e => e.member_id === memberId && e.action === "Clock In").length;
    const pct = scheduled > 0 ? Math.round((present / scheduled) * 100) : 0;
    return { scheduled, present, pct };
  }, [clockEvents, demoClockEvents]);

  // ── SEND MESSAGE ──
  async function sendMessage() {
    if (!msgText.trim()) return;
    const row = { sender_id: loggedIn.id, sender_name: loggedIn.name, text: msgText.trim() };
    if (IS_DEMO) {
      setDemoMessages(prev => [...prev, { ...row, id: Date.now(), timestamp: new Date().toISOString() }]);
    } else {
      try { await (await sb.from("messages")).insert(row); sendPushNotification("chat", loggedIn.name, msgText.trim().slice(0, 80), { sender_id: loggedIn.id }); } catch (e) { setNetError("Message failed."); }
    }
    setMsgText("");
  }

  // ── FIRE EMERGENCY ──
  async function fireEmergency() {
    if (!emergencyMsg.trim()) return;
    playAlarm();
    if (IS_DEMO) {
      setEmergencyAlert({ message: emergencyMsg, raised_by: loggedIn.name, timestamp: new Date().toISOString() });
      if (emergencyTimerRef.current) clearTimeout(emergencyTimerRef.current);
      emergencyTimerRef.current = setTimeout(() => setEmergencyAlert(null), 30000);
    } else {
      try {
        await (await sb.from("emergency_alerts")).insert({ message: emergencyMsg, raised_by: loggedIn.name, active: true });
        await sendPushNotification("emergency", "Emergency Alert", emergencyMsg + " - Raised by " + loggedIn.name, { raised_by: loggedIn.name });
      } catch (e) { setNetError("Emergency alert failed."); }
    }
    setEmergencyModal(false);
    setEmergencyMsg("");
  }

  async function dismissEmergency() {
    setEmergencyAlert(null);
    if (!IS_DEMO && emergencyAlert?.id) {
      try { await (await sb.from("emergency_alerts")).update({ active: false }, `id=eq.${emergencyAlert.id}`); } catch (_) {}
    }
  }

  // ── CHANGE PIN ──
  async function changePin() {
    if (newPin.length !== 4) { setPinMsg("PIN must be 4 digits"); return; }
    if (newPin !== pinConfirm) { setPinMsg("PINs do not match"); return; }
    const hash = await hashPin(newPin);
    if (!IS_DEMO) {
      try { await (await sb.from("members")).update({ pin_hash: hash }, `id=eq.${loggedIn.id}`); } catch (e) { setPinMsg("Update failed. Try again."); return; }
    }
    setMembers(prev => prev.map(m => m.id === loggedIn.id ? { ...m, pin_hash: hash } : m));
    setPinMsg("✓ PIN updated successfully");
    setTimeout(() => { setChangePinModal(false); setNewPin(""); setPinConfirm(""); setPinMsg(""); }, 1200);
  }

  // ── POST ANNOUNCEMENT ──
  async function postAnnouncement() {
    if (!announcementText.trim()) return;
    const row = { text: announcementText.trim(), author: loggedIn.name };
    if (IS_DEMO) {
      setDemoAnnouncements(prev => [{ ...row, id: Date.now(), timestamp: new Date().toISOString() }, ...prev]);
    } else {
      try { await (await sb.from("announcements")).insert(row); } catch (e) { setNetError("Post failed."); }
    }
    setAnnouncementText("");
  }

  // ── SUBMIT INCIDENT ──
  async function submitIncident() {
    if (!incidentForm.reporter || !incidentForm.description) return;
    const row = { ...incidentForm, reporter_id: loggedIn.id };
    if (IS_DEMO) {
      setDemoIncidents(prev => [{ ...row, id: Date.now(), status: "open", timestamp: new Date().toISOString() }, ...prev]);
    } else {
      try { await (await sb.from("incidents")).insert(row); const { data } = await (await sb.from("incidents")).select("*", { order: "timestamp.desc" }); if (data) setIncidents(data); } catch (e) { setNetError("Submit failed."); }
    }
    setIncidentForm({ reporter: "", location: "", type: "", description: "" });
  }

  // ── COVER REQUEST ──
  async function submitCoverRequest() {
    if (!loggedIn) return;
    const todayEntry = findTodayRoster();
    const myDuties = todayEntry ? getMemberDuties(loggedIn.id, todayEntry) : [];
    const row = { requester_id: loggedIn.id, requester_name: loggedIn.name, duty_date: todayEntry?.date || "TBD", role_label: myDuties[0]?.label || "Duty", reason: coverForm.reason, status: "open" };
    if (IS_DEMO) {
      setDemoCoverRequests(prev => [{ ...row, id: Date.now(), timestamp: new Date().toISOString() }, ...prev]);
    } else {
      try { await (await sb.from("cover_requests")).insert(row); } catch (e) { setNetError("Request failed."); }
    }
    setCoverModal(false);
    setCoverForm({ reason: "" });
  }

  // ── SCHEDULE EVENT ──
  async function scheduleEvent() {
    if (!specialForm.title || !specialForm.date) return;
    const row = { title: specialForm.title, event_date: specialForm.date, event_time: specialForm.time, description: specialForm.description, assigned_ids: specialForm.assigned };
    if (IS_DEMO) {
      setDemoSpecialEvents(prev => [...prev, { ...row, id: Date.now() }]);
    } else {
      try { const { data } = await (await sb.from("special_events")).insert(row); if (data) setSpecialEvents(prev => [...prev, ...data]); } catch (e) { setNetError("Schedule failed."); }
    }
    setSpecialModal(false);
    setSpecialForm({ title: "", date: "", time: "", description: "", assigned: [] });
  }

  // ── COMPUTED ──
  const todayEntry = findTodayRoster();
  const duty = getCurrentDuty();
  const isAdmin = loggedIn?.role === "admin";
  const iAmIn = loggedIn ? !!clockedIn[loggedIn.id] : false;
  const myEntry = loggedIn ? clockedIn[loggedIn.id] : null;
  const activeMessages = IS_DEMO ? demoMessages : messages;
  const activeAnnouncements = IS_DEMO ? demoAnnouncements : announcements;
  const activeCoverRequests = IS_DEMO ? demoCoverRequests : coverRequests;
  const activeIncidents = IS_DEMO ? demoIncidents : incidents;
  const activeSpecialEvents = IS_DEMO ? demoSpecialEvents : specialEvents;
  const allClockEvents = IS_DEMO ? demoClockEvents : clockEvents;
  const currentQ = QUARTERS[rosterQ];
  const currentMonthData = currentQ?.months[rosterMonth];

  // ── SCREENS ──

  if (appLoading) return <LoadingScreen message={loadMsg} />;

  // Setup needed
  if (!IS_DEMO && members.length === 0) {
    return (
      <div style={{ minHeight: "100vh", background: `linear-gradient(160deg,${C.bg},#12100e)`, color: C.text, fontFamily: "Georgia, serif", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>

              return (
                <div key={member.id} style={{ background: isIn ? "linear-gradient(135deg,#0f2a0f,#1a3a10)" : C.surface, border: `1px solid ${isIn ? "#3a6a2a" : C.border}`, borderRadius: 9, padding: "9px 12px", marginBottom: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 9, flex: 1, cursor: "pointer" }} onClick={() => setProfileModal(member)}>
                      <div style={{ width: 30, height: 30, borderRadius: "50%", background: isIn ? "#2a5a2a" : "#1e1c14", border: `1px solid ${isIn ? "#4a8a4a" : "#282420"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: "bold", color: isIn ? C.green : C.muted }}>{member.id}</div>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: "bold", color: isIn ? "#c0e8a0" : C.text }}>{member.name}</div>
                        {isIn && <div style={{ fontSize: 10, color: C.green }}>✓ {entry.role_label} · {fT(entry.timestamp)}</div>}
                        {!isIn && isScheduled && !ab && <div style={{ fontSize: 10, color: "#6a5a28" }}>Scheduled: {todayDuties.map(d => d.label).join(" · ")}</div>}
                        {ab && <div style={{ fontSize: 10, color: ab.type === "excused" ? C.amber : C.red }}>{ab.type === "excused" ? "✓ Excused" : "⚠ Unexcused"}{ab.note ? ` — ${ab.note}` : ""}</div>}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                      {!isIn && isScheduled && !ab && (
                        <>
                          <button onClick={() => { setAdminClockModal(member); setSelectedRole(duty.slot || "gate-early"); }} style={{ background: "#1e1608", border: `1px solid ${C.gold}`, color: C.gold, padding: "4px 8px", borderRadius: 6, cursor: "pointer", fontSize: 10, fontFamily: "Georgia, serif" }}>In</button>
                          <button onClick={() => { setAbsenceModal(member); setAbsenceForm({ type: "excused", note: "" }); }} style={{ background: "#2a1a1a", border: "1px solid #4a2a2a", color: C.red, padding: "4px 8px", borderRadius: 6, cursor: "pointer", fontSize: 10, fontFamily: "Georgia, serif" }}>Absent</button>
                        </>
                      )}
                      {isIn && <button onClick={() => doClockOut(member.id)} style={{ background: "#1a1a1a", border: "1px solid #3a3a2a", color: C.amber, padding: "4px 8px", borderRadius: 6, cursor: "pointer", fontSize: 10, fontFamily: "Georgia, serif" }}>Out</button>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══ TEAM CHAT ══ */}
        {tab === "chat" && (
          <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 210px)" }}>
            <div style={{ fontSize: 10, color: C.muted, marginBottom: 8 }}>🔒 Team-only · {IS_DEMO ? "Demo (not shared)" : "Live · synced across all phones"}</div>
            <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8, paddingBottom: 8 }}>
              {activeMessages.map(msg => {
                const isMe = msg.sender_id === loggedIn.id;
                return (
                  <div key={msg.id} style={{ display: "flex", flexDirection: "column", alignItems: isMe ? "flex-end" : "flex-start" }}>
                    {!isMe && <div style={{ fontSize: 9, color: C.muted, marginBottom: 2, marginLeft: 4 }}>{msg.sender_name}</div>}
                    <div style={{ background: isMe ? "linear-gradient(135deg,#1a1508,#2a2010)" : "linear-gradient(135deg,#111818,#0a1414)", border: `1px solid ${isMe ? "#3a2e1a" : "#1a3a3a"}`, borderRadius: isMe ? "12px 12px 3px 12px" : "12px 12px 12px 3px", padding: "8px 12px", maxWidth: "80%" }}>
                      <div style={{ fontSize: 12, color: isMe ? "#e8d8a0" : "#a0d8d8", lineHeight: 1.5 }}>{msg.text}</div>
                      <div style={{ fontSize: 9, color: C.dim, marginTop: 2, textAlign: "right" }}>{fT(msg.timestamp)}</div>
                    </div>
                  </div>
                );
              })}
              <div ref={msgEndRef} />
            </div>
            <div style={{ display: "flex", gap: 7, paddingTop: 8, borderTop: `1px solid ${C.border}` }}>
              <input value={msgText} onChange={e => setMsgText(e.target.value)} onKeyDown={e => { if (e.key === "Enter") sendMessage(); }} placeholder="Type a message..." style={{ flex: 1, background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 9, padding: "9px 11px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif" }} />
              <button onClick={sendMessage} style={{ background: "#1e1608", border: `1px solid ${C.gold}`, color: C.gold, padding: "9px 14px", borderRadius: 9, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, fontWeight: "bold" }}>Send</button>
            </div>
          </div>
        )}

        {/* ══ INCIDENTS ══ */}
        {tab === "incidents" && (
          <div>
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 13, marginBottom: 13 }}>
              <div style={{ fontSize: 12, fontWeight: "bold", color: C.gold, marginBottom: 10 }}>⚠️ New Incident Report</div>
              {[{ key: "reporter", label: "Reported By", ph: loggedIn.name }, { key: "location", label: "Location", ph: "Gate, Camera Room, Patrol..." }].map(f => (
                <div key={f.key} style={{ marginBottom: 8 }}>
                  <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 2 }}>{f.label}</label>
                  <input value={incidentForm[f.key]} onChange={e => setIncidentForm(p => ({ ...p, [f.key]: e.target.value }))} placeholder={f.ph} style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif" }} />
                </div>
              ))}
              <div style={{ marginBottom: 8 }}>
                <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 2 }}>Type</label>
                <select value={incidentForm.type} onChange={e => setIncidentForm(p => ({ ...p, type: e.target.value }))} style={{ width: "100%", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: incidentForm.type ? C.text : C.dim, fontSize: 12, fontFamily: "Georgia, serif" }}>
                  <option value="">Select type...</option>
                  {["Suspicious Person", "Medical Emergency", "Altercation / Disturbance", "Theft / Loss", "Child Safety", "Fire / Hazard", "Unauthorised Access", "Scanner Issue", "Other"].map(o => <option key={o}>{o}</option>)}
                </select>
              </div>
              <div style={{ marginBottom: 11 }}>
                <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 2 }}>Description</label>
                <textarea value={incidentForm.description} onChange={e => setIncidentForm(p => ({ ...p, description: e.target.value }))} rows={3} placeholder="Describe clearly..." style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif", resize: "vertical" }} />
              </div>
              <button onClick={submitIncident} style={{ width: "100%", background: "linear-gradient(135deg,#1e1608,#2a2010)", border: `1px solid ${C.gold}`, color: C.gold, padding: 9, borderRadius: 8, cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif", fontWeight: "bold" }}>Submit Report</button>
            </div>
            {activeIncidents.length === 0 && <div style={{ textAlign: "center", color: C.dim, fontSize: 12, padding: "16px 0" }}>No incidents logged. Stay alert. 🙏</div>}
            {activeIncidents.map(inc => (
              <div key={inc.id} style={{ background: "#180e08", border: "1px solid #3a2018", borderLeft: "3px solid #cd7a3a", borderRadius: 9, padding: 10, marginBottom: 6 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
                  <div style={{ fontSize: 11, fontWeight: "bold", color: "#e8c890" }}>{inc.type || "Incident"}</div>
                  <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                    <div style={{ fontSize: 9, color: "#6a4a2a" }}>{fT(inc.timestamp)}</div>
                    {isAdmin && (
                      <div style={{ fontSize: 9, background: inc.status === "closed" ? "#1a3a1a" : "#2a1a08", border: `1px solid ${inc.status === "closed" ? "#4a8a4a" : "#5a3a18"}`, color: inc.status === "closed" ? C.green : C.amber, padding: "1px 7px", borderRadius: 9, cursor: "pointer" }}
                        onClick={async () => {
                          const newStatus = inc.status === "closed" ? "open" : "closed";
                          if (IS_DEMO) { setDemoIncidents(prev => prev.map(i => i.id === inc.id ? { ...i, status: newStatus } : i)); }
                          else { try { await (await sb.from("incidents")).update({ status: newStatus }, `id=eq.${inc.id}`); setIncidents(prev => prev.map(i => i.id === inc.id ? { ...i, status: newStatus } : i)); } catch (_) {} }
                        }}>
                        {inc.status === "closed" ? "Closed" : "Open"}
                      </div>
                    )}
                  </div>
                </div>
                <div style={{ fontSize: 10, color: "#8a6a4a", marginBottom: 2 }}>📍 {inc.location || "—"} · {inc.reporter}</div>
                <div style={{ fontSize: 11, color: "#c0a870" }}>{inc.description}</div>
              </div>
            ))}
          </div>
        )}

        {/* ══ DUTY REPORT ══ */}
        {tab === "report" && isAdmin && (
          <div>
            {!reportData ? (
              <div style={{ textAlign: "center", padding: "26px 0" }}>
                <div style={{ fontSize: 34, marginBottom: 8 }}>📊</div>
                <div style={{ fontSize: 12, color: C.muted, marginBottom: 16, lineHeight: 1.7 }}>Auto-generates at <strong style={{ color: C.gold }}>2:00 PM</strong> every Sunday.<br />Or generate manually now.</div>
                {isSunday() && <button onClick={buildReport} style={{ background: "#1e1608", border: `1px solid ${C.gold}`, color: C.gold, padding: "9px 20px", borderRadius: 9, cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif" }}>📊 Generate Now</button>}
              </div>
            ) : (
              <div>
                <div style={{ background: "linear-gradient(135deg,#1a1508,#0f1a0a)", border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 12, textAlign: "center" }}>
                  <div style={{ fontSize: 9, letterSpacing: 3, color: C.gold, textTransform: "uppercase" }}>✝ The Living Shield</div>
                  <div style={{ fontSize: 14, fontWeight: "bold", color: "#f0e6c8" }}>LSC Abuja Safety Unit</div>
                  <div style={{ fontSize: 11, color: C.muted }}>SUNDAY DUTY REPORT</div>
                  <div style={{ fontSize: 10, color: C.dim, marginTop: 3 }}>{reportData.dateLabel} · Generated {fT(reportData.generated)}</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 7, marginBottom: 12 }}>
                  {[{ label: "Present", value: reportData.rows.filter(m => m.status === "PRESENT").length, color: C.green }, { label: "Absent", value: reportData.rows.filter(m => m.status === "ABSENT").length, color: C.red }, { label: "Excused", value: reportData.rows.filter(m => m.status === "EXCUSED").length, color: C.amber }].map(s => (
                    <div key={s.label} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, padding: "9px 7px", textAlign: "center" }}>
                      <div style={{ fontSize: 20, fontWeight: "bold", color: s.color }}>{s.value}</div>
                      <div style={{ fontSize: 9, color: C.dim, marginTop: 1 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
                {["PRESENT", "ABSENT", "EXCUSED"].map(status => {
                  const filtered = reportData.rows.filter(m => m.status === status);
                  if (!filtered.length) return null;
                  const sColor = status === "PRESENT" ? C.green : status === "ABSENT" ? C.red : C.amber;
                  return (
                    <div key={status}>
                      <div style={{ fontSize: 11, color: sColor, fontWeight: "bold", margin: "10px 0 5px" }}>{status === "PRESENT" ? "✓ Present" : status === "ABSENT" ? "✗ Absent" : "◎ Excused"}</div>
                      {filtered.map(m => (
                        <div key={m.id} style={{ background: status === "PRESENT" ? "#0f1a0f" : status === "ABSENT" ? "#1a0f0f" : "#1a1a08", border: `1px solid ${status === "PRESENT" ? "#2a4a2a" : status === "ABSENT" ? "#4a2a2a" : "#4a4a18"}`, borderRadius: 9, padding: "8px 11px", marginBottom: 5, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <div style={{ fontSize: 12, fontWeight: "bold", color: status === "PRESENT" ? "#c0e8a0" : status === "ABSENT" ? "#e8a0a0" : "#e8e8a0" }}>{m.name}</div>
                            <div style={{ fontSize: 10, color: "#5a8a5a" }}>{status === "EXCUSED" ? m.absenceNote || "No reason" : m.roleLabel}</div>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 10, fontWeight: "bold", color: sColor }}>{status}</div>
                            {status === "PRESENT" && <div style={{ fontSize: 9, color: "#4a7a4a" }}>In: {fT(m.clockInTime)}</div>}
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })}
                <button onClick={buildReport} style={{ width: "100%", marginTop: 10, background: "#1e1608", border: `1px solid ${C.gold}`, color: C.gold, padding: 8, borderRadius: 8, cursor: "pointer", fontSize: 11, fontFamily: "Georgia, serif" }}>🔄 Refresh</button>
              </div>
            )}
          </div>
        )}

        {/* ══ MONTHLY ══ */}
        {tab === "monthly" && isAdmin && (() => {
          const [selYear, setSelYear] = useState(new Date().getFullYear());
          const [selMonth, setSelMonth] = useState(new Date().getMonth());
          const allSundays = Object.values(QUARTERS).flatMap(q => q.months.flatMap(m => m.sundays)).filter(s => s.month === selMonth && s.year === selYear);
          const totalDuties = allSundays.length;
          const monthClockIns = allClockEvents.filter(e => { const d = new Date(e.timestamp); return d.getMonth() === selMonth && d.getFullYear() === selYear && e.action === "Clock In"; });
          const uniquePresent = new Set(monthClockIns.map(e => e.member_id)).size;
          const monthInc = activeIncidents.filter(i => { const d = new Date(i.timestamp); return d.getMonth() === selMonth && d.getFullYear() === selYear; });
          const memberRows = TEAM_CONFIG.map(m => {
            const present = monthClockIns.filter(e => e.member_id === m.id).length;
            const scheduled = allSundays.filter(s => Object.values(s.slots).some(p => p.some(pair => pair.includes(m.id)))).length;
            return { ...m, present, scheduled, pct: scheduled > 0 ? Math.round((present / scheduled) * 100) : 0 };
          });
          return (
            <div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                <select value={selMonth} onChange={e => setSelMonth(+e.target.value)} style={{ flex: 1, background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif" }}>
                  {Array.from({ length: 12 }, (_, i) => <option key={i} value={i}>{MON(i)}</option>)}
                </select>
                <select value={selYear} onChange={e => setSelYear(+e.target.value)} style={{ background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif" }}>
                  {[2025, 2026].map(y => <option key={y}>{y}</option>)}
                </select>
              </div>
              <div style={{ background: "linear-gradient(135deg,#1a1508,#0f1a0a)", border: `1px solid ${C.border}`, borderRadius: 10, padding: "11px 13px", marginBottom: 12, textAlign: "center" }}>
                <div style={{ fontSize: 9, letterSpacing: 3, color: C.gold, textTransform: "uppercase" }}>✝ The Living Shield — LSC Abuja Safety Unit</div>
                <div style={{ fontSize: 13, fontWeight: "bold", color: "#f0e6c8", marginTop: 2 }}>MONTHLY SUMMARY — {MON(selMonth).toUpperCase()} {selYear}</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 12 }}>
                {[{ label: "Services", value: totalDuties, color: C.gold }, { label: "Members Present", value: uniquePresent, color: C.green }, { label: "Incidents", value: monthInc.length, color: "#cd7a3a" }, { label: "Team Size", value: TEAM_CONFIG.length, color: C.blue }].map(s => (
                  <div key={s.label} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, padding: "10px 8px", textAlign: "center" }}>
                    <div style={{ fontSize: 20, fontWeight: "bold", color: s.color }}>{s.value}</div>
                    <div style={{ fontSize: 9, color: C.dim, marginTop: 2 }}>{s.label}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 11, color: C.gold, fontWeight: "bold", marginBottom: 8 }}>Attendance by Member</div>
              {[...memberRows].sort((a, b) => b.pct - a.pct).map(m => (
                <div key={m.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, padding: "9px 12px", marginBottom: 5, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                    <div style={{ width: 26, height: 26, borderRadius: "50%", background: "#1e1c14", border: "1px solid #282420", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: C.muted }}>{m.id}</div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: "bold", color: C.text }}>{m.name}</div>
                      <div style={{ fontSize: 10, color: C.dim }}>{m.present}/{m.scheduled} services</div>
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 14, fontWeight: "bold", color: m.pct >= 80 ? C.green : m.pct >= 50 ? C.amber : C.red }}>{m.pct}%</div>
                  </div>
                </div>
              ))}
            </div>
          );
        })()}

        {/* ══ NOTICE ══ */}
        {tab === "notice" && isAdmin && (
          <div>
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 13, marginBottom: 13 }}>
              <textarea value={announcementText} onChange={e => setAnnouncementText(e.target.value)} placeholder="Type message for all members..." rows={3} style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "8px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif", resize: "vertical", marginBottom: 9 }} />
              <button onClick={postAnnouncement} style={{ width: "100%", background: "linear-gradient(135deg,#1e1608,#2a2010)", border: `1px solid ${C.gold}`, color: C.gold, padding: 9, borderRadius: 8, cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif", fontWeight: "bold" }}>📢 Post to All Members</button>
            </div>
            {activeAnnouncements.map(a => (
              <div key={a.id} style={{ background: "#0a1218", border: "1px solid #1a3a4a", borderRadius: 9, padding: "10px 12px", marginBottom: 6, display: "flex", gap: 10, justifyContent: "space-between" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, color: "#a0c8e8", lineHeight: 1.6 }}>{a.text}</div>
                  <div style={{ fontSize: 9, color: "#3a5a6a", marginTop: 2 }}>{fD(a.timestamp)} · {a.author}</div>
                </div>
                <button onClick={async () => {
                  if (IS_DEMO) { setDemoAnnouncements(prev => prev.filter(x => x.id !== a.id)); }
                  else { try { await (await sb.from("announcements")).delete(`id=eq.${a.id}`); setAnnouncements(prev => prev.filter(x => x.id !== a.id)); } catch (_) {} }
                }} style={{ background: "#2a1a1a", border: "1px solid #4a2a2a", color: C.red, fontSize: 9, padding: "3px 7px", borderRadius: 6, cursor: "pointer", fontFamily: "Georgia, serif", flexShrink: 0 }}>Del</button>
              </div>
            ))}
          </div>
        )}

        {/* ══ EVENTS ══ */}
        {tab === "events" && isAdmin && (
          <div>
            <button onClick={() => setSpecialModal(true)} style={{ width: "100%", background: "linear-gradient(135deg,#120a1a,#1a0e24)", border: "1px solid #3a2a4a", color: C.purple, padding: "10px", borderRadius: 9, cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif", fontWeight: "bold", marginBottom: 13 }}>
              + Schedule Special Programme
            </button>
            {activeSpecialEvents.length === 0 && <div style={{ textAlign: "center", color: C.dim, fontSize: 12, padding: "20px 0" }}>No special events scheduled.</div>}
            {[...activeSpecialEvents].sort((a, b) => new Date(a.event_date || a.date) - new Date(b.event_date || b.date)).map(e => (
              <div key={e.id} style={{ background: "linear-gradient(135deg,#120a1a,#0e0814)", border: "1px solid #2a1a3a", borderLeft: "3px solid #9E6EC8", borderRadius: 10, padding: "11px 13px", marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <div style={{ fontSize: 13, fontWeight: "bold", color: "#d0b0e8" }}>{e.title}</div>
                  <button onClick={async () => {
                    if (IS_DEMO) { setDemoSpecialEvents(prev => prev.filter(x => x.id !== e.id)); }
                    else { try { await (await sb.from("special_events")).delete(`id=eq.${e.id}`); setSpecialEvents(prev => prev.filter(x => x.id !== e.id)); } catch (_) {} }
                  }} style={{ background: "transparent", border: "none", color: C.red, cursor: "pointer", fontSize: 11 }}>✕</button>
                </div>
                <div style={{ fontSize: 10, color: "#7a5a9a" }}>📅 {fDL(e.event_date || e.date)} · ⏰ {e.event_time || e.time}</div>

                {(e.assigned_ids || e.assigned || []).length > 0 && <div style={{ fontSize: 10, color: "#5a4a6a", marginTop: 3 }}>Assigned: {(e.assigned_ids || e.assigned).map(id => getMember(id)?.name).filter(Boolean).join(", ")}</div>}
              </div>
            ))}
          </div>
        )}

        {/* ══ MY PROFILE ══ */}
        {tab === "myprofile" && !isAdmin && (() => {
          const stats = getMemberStats(loggedIn.id);
          const myIns = allClockEvents.filter(e => e.member_id === loggedIn.id && e.action === "Clock In");
          return (
            <div>
              <div style={{ background: "linear-gradient(135deg,#1a1508,#0f1a0a)", border: `1px solid ${C.border}`, borderRadius: 12, padding: "18px 16px", marginBottom: 14, textAlign: "center" }}>
                <div style={{ width: 54, height: 54, borderRadius: "50%", background: "#2a1f08", border: `2px solid ${C.gold}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: "bold", color: C.gold, margin: "0 auto 10px" }}>{loggedIn.id}</div>
                <div style={{ fontSize: 17, fontWeight: "bold", color: "#f0e6c8" }}>{loggedIn.name}</div>
                <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>Safety Team · LSC Abuja Safety Unit</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 12 }}>
                {[{ label: "Duties Served", value: stats.present, color: C.green }, { label: "Scheduled", value: stats.scheduled, color: C.gold }, { label: "Attendance Rate", value: `${stats.pct}%`, color: stats.pct >= 80 ? C.green : stats.pct >= 50 ? C.amber : C.red }, { label: "Score", value: stats.pct >= 80 ? "🌟" : stats.pct >= 60 ? "👍" : stats.pct >= 40 ? "⚠️" : "❌", color: C.text }].map(s => (
                  <div key={s.label} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, padding: "10px 8px", textAlign: "center" }}>
                    <div style={{ fontSize: 20, fontWeight: "bold", color: s.color }}>{s.value}</div>
                    <div style={{ fontSize: 9, color: C.dim, marginTop: 2 }}>{s.label}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "11px 12px", marginBottom: 12 }}>
                <div style={{ fontSize: 10, color: C.muted, marginBottom: 5 }}>Faithfulness Score</div>
                <div style={{ background: "#1a1a1a", borderRadius: 20, height: 9, overflow: "hidden", marginBottom: 4 }}>
                  <div style={{ background: stats.pct >= 80 ? C.green : stats.pct >= 50 ? C.amber : C.red, width: `${stats.pct}%`, height: "100%", borderRadius: 20 }} />
                </div>
                <div style={{ fontSize: 11, color: stats.pct >= 80 ? C.green : stats.pct >= 50 ? C.amber : C.red, fontWeight: "bold" }}>{stats.pct >= 80 ? "Excellent — Keep it up! 🌟" : stats.pct >= 60 ? "Good — Stay consistent 👍" : stats.pct >= 40 ? "Fair — You can do better" : "Needs improvement"}</div>
              </div>
              <div style={{ fontSize: 11, color: C.gold, fontWeight: "bold", marginBottom: 6 }}>Recent Duties</div>
              {myIns.length === 0 && <div style={{ color: C.dim, fontSize: 12, textAlign: "center", padding: "12px 0" }}>No records yet.</div>}
              {[...myIns].reverse().slice(0, 8).map(e => (
                <div key={e.id} style={{ background: "#0f1a0f", border: "1px solid #2a4a2a", borderRadius: 8, padding: "8px 11px", marginBottom: 5, display: "flex", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ fontSize: 11, color: "#c0e8a0" }}>{e.role_label || "—"}</div>
                    <div style={{ fontSize: 9, color: "#4a7a4a" }}>{e.duty_label}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 10, color: C.green, fontWeight: "bold" }}>PRESENT</div>
                    <div style={{ fontSize: 9, color: C.dim }}>{fD(e.timestamp)} {fT(e.timestamp)}</div>
                  </div>
                </div>
              ))}
              <button onClick={() => setChangePinModal(true)} style={{ width: "100%", marginTop: 10, background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: "9px", borderRadius: 9, cursor: "pointer", fontSize: 11, fontFamily: "Georgia, serif" }}>🔒 Change PIN</button>
            </div>
          );
        })()}

      </div>

      {/* ══ MODALS ══ */}

      {clockRoleModal && (
        <Modal onClose={() => setClockRoleModal(false)}>
          <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 2, marginBottom: 2 }}>Clocking In — {loggedIn.name}</div>
          <div style={{ background: duty.status === "LIVE" ? "#0f2a0f" : "#181808", border: `1px solid ${duty.status === "LIVE" ? "#3a7a3a" : "#4a4a18"}`, borderRadius: 8, padding: "8px 12px", marginBottom: 12 }}>
            <div style={{ fontSize: 9, color: duty.status === "LIVE" ? C.green : C.amber, letterSpacing: 2, textTransform: "uppercase", marginBottom: 1 }}>Clocking In For</div>
            <div style={{ fontSize: 12, fontWeight: "bold", color: "#e8d8a0" }}>{duty.label}</div>
            <div style={{ fontSize: 10, color: C.muted }}>⏰ {duty.time}</div>
          </div>
          <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 4 }}>Select Role / Post</label>
          <select value={selectedRole} onChange={e => setSelectedRole(e.target.value)} style={{ width: "100%", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif", marginBottom: 13 }}>
            {DUTY_ROLES.map(r => <option key={r.id} value={r.id}>{r.icon} {r.label} — {r.time}</option>)}
          </select>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button onClick={() => setClockRoleModal(false)} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Cancel</button>
            <button onClick={() => { doClockIn(loggedIn.id, selectedRole); setClockRoleModal(false); }} style={{ background: "linear-gradient(135deg,#1a3a1a,#2a5a1a)", border: "1px solid #4a8a4a", color: C.green, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, fontWeight: "bold" }}>✓ Clock In</button>
          </div>
        </Modal>
      )}

      {adminClockModal && (
        <Modal onClose={() => setAdminClockModal(null)}>
          <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 2, marginBottom: 2 }}>Admin — Clock In On Behalf</div>
          <div style={{ fontSize: 15, fontWeight: "bold", color: C.gold, marginBottom: 12 }}>{adminClockModal.name}</div>
          <select value={selectedRole} onChange={e => setSelectedRole(e.target.value)} style={{ width: "100%", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif", marginBottom: 13 }}>
            {DUTY_ROLES.map(r => <option key={r.id} value={r.id}>{r.icon} {r.label} — {r.time}</option>)}
          </select>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button onClick={() => setAdminClockModal(null)} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Cancel</button>
            <button onClick={() => { doClockIn(adminClockModal.id, selectedRole); setAdminClockModal(null); }} style={{ background: "linear-gradient(135deg,#1a3a1a,#2a5a1a)", border: "1px solid #4a8a4a", color: C.green, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, fontWeight: "bold" }}>✓ Confirm</button>
          </div>
        </Modal>
      )}

      {absenceModal && (
        <Modal onClose={() => setAbsenceModal(null)}>
          <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 2, marginBottom: 2 }}>Mark Absence</div>
          <div style={{ fontSize: 15, fontWeight: "bold", color: C.gold, marginBottom: 12 }}>{absenceModal.name}</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 11 }}>
            {["excused", "unexcused"].map(t => (
              <button key={t} onClick={() => setAbsenceForm(p => ({ ...p, type: t }))} style={{ background: absenceForm.type === t ? (t === "excused" ? "#1a1a08" : "#2a0808") : C.surface, border: `1px solid ${absenceForm.type === t ? (t === "excused" ? "#5a5a18" : "#5a1818") : C.border}`, color: absenceForm.type === t ? (t === "excused" ? C.amber : C.red) : C.muted, padding: "8px", borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 11, textTransform: "capitalize", fontWeight: absenceForm.type === t ? "bold" : "normal" }}>{t}</button>
            ))}
          </div>
          <input value={absenceForm.note} onChange={e => setAbsenceForm(p => ({ ...p, note: e.target.value }))} placeholder="Reason (optional)" style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "8px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif", marginBottom: 13 }} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button onClick={() => setAbsenceModal(null)} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Cancel</button>
            <button onClick={async () => {
              setAbsenceNotes(prev => ({ ...prev, [absenceModal.id]: absenceForm }));
              if (!IS_DEMO) {
                try {
                  await (await sb.from("absence_notes")).insert({ member_id: absenceModal.id, type: absenceForm.type, note: absenceForm.note, service_date: new Date().toISOString().split("T")[0] });
                } catch (_) {}
              }
              setAbsenceModal(null);
            }} style={{ background: "linear-gradient(135deg,#1a1a08,#2a2a08)", border: "1px solid #5a5a18", color: C.amber, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, fontWeight: "bold" }}>✓ Confirm</button>
          </div>
        </Modal>
      )}

      {emergencyModal && (
        <Modal onClose={() => setEmergencyModal(false)}>
          <div style={{ fontSize: 9, color: C.red, textTransform: "uppercase", letterSpacing: 3, marginBottom: 2 }}>🚨 Emergency Alert</div>
          <div style={{ fontSize: 13, fontWeight: "bold", color: "#ff8888", marginBottom: 12 }}>Sends alarm to ALL phones immediately</div>
          <div style={{ display: "grid", gap: 6, marginBottom: 12 }}>
            {["Converge at the Main Entrance immediately", "Medical emergency — first aiders respond NOW", "Suspicious threat detected — all posts on high alert", "Fire emergency — begin evacuation", "Child missing — all exits on lockdown"].map(preset => (
              <button key={preset} onClick={() => setEmergencyMsg(preset)} style={{ background: emergencyMsg === preset ? "#2a0808" : "#1a0808", border: `1px solid ${emergencyMsg === preset ? "#8a2828" : "#3a1818"}`, color: emergencyMsg === preset ? "#ff8888" : "#aa5555", padding: "8px 12px", borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 11, textAlign: "left" }}>{preset}</button>
            ))}
          </div>
          <input value={emergencyMsg} onChange={e => setEmergencyMsg(e.target.value)} placeholder="Or type custom message..." style={{ width: "100%", boxSizing: "border-box", background: "#1a0808", border: "1px solid #4a2020", borderRadius: 8, padding: "9px 11px", color: "#ffaaaa", fontSize: 12, fontFamily: "Georgia, serif", marginBottom: 13 }} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button onClick={() => setEmergencyModal(false)} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Cancel</button>
            <button onClick={fireEmergency} style={{ background: "linear-gradient(135deg,#3a0808,#5a1010)", border: "1px solid #8a2828", color: "#ff6666", padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, fontWeight: "bold" }}>🚨 SEND ALERT</button>
          </div>
        </Modal>
      )}

      {specialModal && (
        <Modal onClose={() => setSpecialModal(false)}>
          <div style={{ fontSize: 9, color: C.purple, textTransform: "uppercase", letterSpacing: 2, marginBottom: 2 }}>Schedule Special Programme</div>
          {[{ key: "title", label: "Event Title", ph: "e.g. Easter Service, Convention..." }, { key: "time", label: "Time", ph: "e.g. 6:00 AM" }].map(f => (
            <div key={f.key} style={{ marginBottom: 9 }}>
              <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 3 }}>{f.label}</label>
              <input value={specialForm[f.key]} onChange={e => setSpecialForm(p => ({ ...p, [f.key]: e.target.value }))} placeholder={f.ph} style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "8px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif" }} />
            </div>
          ))}
          <div style={{ marginBottom: 9 }}>
            <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 3 }}>Date</label>
            <input type="date" value={specialForm.date} onChange={e => setSpecialForm(p => ({ ...p, date: e.target.value }))} style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "8px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif" }} />
          </div>
          <div style={{ marginBottom: 9 }}>
            <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 3 }}>Description (optional)</label>
            <textarea value={specialForm.description} onChange={e => setSpecialForm(p => ({ ...p, description: e.target.value }))} rows={2} style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "8px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif", resize: "vertical" }} />
          </div>
          <div style={{ marginBottom: 13 }}>
            <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 5 }}>Assign Members</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {TEAM_CONFIG.map(m => {
                const sel = specialForm.assigned.includes(m.id);
                return <button key={m.id} onClick={() => setSpecialForm(p => ({ ...p, assigned: sel ? p.assigned.filter(x => x !== m.id) : [...p.assigned, m.id] }))} style={{ background: sel ? "#1a0a28" : "#111010", border: `1px solid ${sel ? "#5a2a8a" : C.border}`, color: sel ? "#c090e8" : C.muted, padding: "4px 10px", borderRadius: 20, cursor: "pointer", fontSize: 11, fontFamily: "Georgia, serif" }}>{m.name}</button>;
              })}
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button onClick={() => setSpecialModal(false)} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Cancel</button>
            <button onClick={scheduleEvent} style={{ background: "linear-gradient(135deg,#120a1a,#2a1040)", border: "1px solid #5a3a8a", color: C.purple, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, fontWeight: "bold" }}>✓ Schedule</button>
          </div>
        </Modal>
      )}

      {profileModal && (
        <Modal onClose={() => setProfileModal(null)}>
          {(() => {
            const m = profileModal; const stats = getMemberStats(m.id);
            return (
              <>
                <div style={{ textAlign: "center", marginBottom: 14 }}>
                  <div style={{ width: 48, height: 48, borderRadius: "50%", background: "#2a1f08", border: `2px solid ${C.gold}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: "bold", color: C.gold, margin: "0 auto 8px" }}>{m.id}</div>
                  <div style={{ fontSize: 16, fontWeight: "bold", color: "#f0e6c8" }}>{m.name}</div>
                  <div style={{ fontSize: 10, color: C.muted }}>Safety Team · LSC Abuja</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 12 }}>
                  {[{ label: "Duties Served", value: stats.present, color: C.green }, { label: "Attendance Rate", value: `${stats.pct}%`, color: stats.pct >= 80 ? C.green : stats.pct >= 50 ? C.amber : C.red }].map(s => (
                    <div key={s.label} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, padding: "9px 7px", textAlign: "center" }}>
                      <div style={{ fontSize: 19, fontWeight: "bold", color: s.color }}>{s.value}</div>
                      <div style={{ fontSize: 9, color: C.dim, marginTop: 1 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, padding: "10px 12px", marginBottom: 10 }}>
                  <div style={{ fontSize: 10, color: C.muted, marginBottom: 5 }}>Faithfulness Score</div>
                  <div style={{ background: "#1a1a1a", borderRadius: 20, height: 8, overflow: "hidden", marginBottom: 3 }}>
                    <div style={{ background: stats.pct >= 80 ? C.green : stats.pct >= 50 ? C.amber : C.red, width: `${stats.pct}%`, height: "100%", borderRadius: 20 }} />
                  </div>
                  <div style={{ fontSize: 10, color: stats.pct >= 80 ? C.green : stats.pct >= 50 ? C.amber : C.red, fontWeight: "bold" }}>{stats.pct >= 80 ? "Excellent 🌟" : stats.pct >= 60 ? "Good 👍" : stats.pct >= 40 ? "Fair" : "Needs improvement"}</div>
                </div>
                {absenceNotes[m.id] && <div style={{ background: "#1a1a08", border: "1px solid #4a4a18", borderRadius: 9, padding: "9px 12px", marginBottom: 10 }}><div style={{ fontSize: 10, color: C.amber, fontWeight: "bold", marginBottom: 2 }}>Absence Note</div><div style={{ fontSize: 11, color: "#c0c060" }}>{absenceNotes[m.id].type} — {absenceNotes[m.id].note || "No reason given"}</div></div>}
                <button onClick={() => setProfileModal(null)} style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: 9, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Close</button>
              </>
            );
          })()}
        </Modal>
      )}

      {coverModal && (
        <Modal onClose={() => setCoverModal(false)}>
          <div style={{ fontSize: 9, color: C.purple, textTransform: "uppercase", letterSpacing: 2, marginBottom: 2 }}>Request Cover for My Duty</div>
          <div style={{ fontSize: 15, fontWeight: "bold", color: C.gold, marginBottom: 12 }}>{loggedIn.name}</div>
          <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 4 }}>Reason for unavailability</label>
          <input value={coverForm.reason} onChange={e => setCoverForm(p => ({ ...p, reason: e.target.value }))} placeholder="e.g. Travelling, Family emergency..." style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "8px 10px", color: C.text, fontSize: 12, fontFamily: "Georgia, serif", marginBottom: 13 }} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button onClick={() => setCoverModal(false)} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Cancel</button>
            <button onClick={submitCoverRequest} style={{ background: "linear-gradient(135deg,#120a1a,#2a1040)", border: "1px solid #5a3a8a", color: C.purple, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, fontWeight: "bold" }}>🔄 Send Request</button>
          </div>
        </Modal>
      )}

      {changePinModal && (
        <Modal onClose={() => { setChangePinModal(false); setNewPin(""); setPinConfirm(""); setPinMsg(""); }}>
          <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 2, marginBottom: 2 }}>Change PIN</div>
          <div style={{ fontSize: 15, fontWeight: "bold", color: C.gold, marginBottom: 14 }}>{loggedIn.name}</div>
          {[{ val: newPin, set: setNewPin, label: "New 4-digit PIN" }, { val: pinConfirm, set: setPinConfirm, label: "Confirm PIN" }].map((f, i) => (
            <div key={i} style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 3 }}>{f.label}</label>
              <input type="password" inputMode="numeric" maxLength={4} value={f.val} onChange={e => f.set(e.target.value.replace(/\D/g, ""))} placeholder="••••" style={{ width: "100%", boxSizing: "border-box", background: "#0a0908", border: `1px solid ${C.border}`, borderRadius: 7, padding: "10px 11px", color: C.text, fontSize: 20, fontFamily: "monospace", textAlign: "center", letterSpacing: 8 }} />
            </div>
          ))}
          {pinMsg && <div style={{ fontSize: 11, color: pinMsg.includes("✓") ? C.green : C.red, marginBottom: 8, textAlign: "center" }}>{pinMsg}</div>}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button onClick={() => { setChangePinModal(false); setNewPin(""); setPinConfirm(""); setPinMsg(""); }} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.muted, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Cancel</button>
            <button onClick={changePin} style={{ background: "linear-gradient(135deg,#1a1508,#2a2010)", border: `1px solid ${C.gold}`, color: C.gold, padding: 10, borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, fontWeight: "bold" }}>✓ Save PIN</button>
          </div>
        </Modal>
      )}

      <div style={{ textAlign: "center", padding: "8px", fontSize: 9, color: "#1a1810", borderTop: "1px solid #161410" }}>
        "Unless the LORD watches over the city, the watchmen stand guard in vain." — Psalm 127:1
      </div>
    </div>
  );
}

// Wrap with error boundary
export default function App() {
  return (
    <ErrorBoundary>
      <MainApp />
    </ErrorBoundary>
  );
}

  </script>

  <script>
    // Wait for Babel to finish then mount
    function mountApp() {
      if (typeof App !== 'undefined') {
        var container = document.getElementById('root');
        var root = ReactDOM.createRoot(container);
        root.render(React.createElement(App));
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hidden'); setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 600); }
      } else {
        setTimeout(mountApp, 100);
      }
    }
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(mountApp, 500);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
