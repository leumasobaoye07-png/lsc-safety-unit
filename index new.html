// ── CRYPTO ────────────────────────────────────────────────────────
async function hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function getSundays(qStart, yr) {
  const out=[];
  for(let m=qStart;m<qStart+3;m++){
    const d=new Date(yr,m,1);
    while(d.getDay()!==0) d.setDate(d.getDate()+1);
    while(d.getMonth()===m){out.push({d:d.getDate(),m,yr});d.setDate(d.getDate()+7);}
  }
  return out;
}
function shuffle(arr,seed){
  const a=[...arr];let s=seed;
  for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function genQ(label,qs,yr){
  const sundays=getSundays(qs,yr);
  const ids=shuffle(TEAM.map(t=>t.id),yr*100+qs+7);
  const byMonth={};
  sundays.forEach(s=>{if(!byMonth[s.m])byMonth[s.m]=[];byMonth[s.m].push(s);});
  return {
    quarter:label,
    months:Object.entries(byMonth).map(([mk,days])=>({
      label:`${MON[+mk]} ${yr}`,
      sundays:days.map((s,si)=>{
        const p=n=>ids[(si*5+n)%ids.length];
        return {
          date:`Sunday ${ORD(s.d)} ${MON[s.m]}`,d:s.d,m:s.m,yr:s.yr,
          slots:{"gate-early":[[p(0),p(1)]],"camera-early":[[p(2)],[p(3)]],"gate-late":[[p(4),p(5)]],"camera-late":[[p(6)],[p(7)]],"patrol":[[p(8)]]}
        };
      })
    }))
  };
}

function findToday(){
  const n=new Date(),d=n.getDate(),m=n.getMonth(),yr=n.getFullYear();
  for(const q of Object.values(QUARTERS)) for(const mo of q.months) for(const s of mo.sundays) if(s.d===d&&s.m===m&&s.yr===yr) return s;
  return null;
}

// ── PIN PAD ───────────────────────────────────────────────────────
function PinPad({member, onSuccess, onCancel}){
  const [pin,setPin]=useState("");
  const [shake,setShake]=useState(false);
  const [hint,setHint]=useState("");
  const [busy,setBusy]=useState(false);

  const press = async d => {
    if(pin.length>=4||busy) return;
    const next=pin+d;
    setPin(next);
    if(next.length===4){
      setBusy(true);
      const h2=await hashPin(next);
      if(h2===member.pin_hash){onSuccess();}
      else{setShake(true);setHint("Wrong PIN");setTimeout(()=>{setPin("");setShake(false);setHint("");setBusy(false);},800);}
    }
  };

  return h("div",{style:{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:400,padding:12}},
    h("div",{style:{background:"linear-gradient(180deg,#1a1710,#0f0e0a)",border:"1px solid #2a2218",borderRadius:"16px 16px 12px 12px",padding:22,width:"100%",maxWidth:380},onClick:e=>e.stopPropagation()},
      div({textAlign:"center",marginBottom:16},
        div({fontSize:12,color:C.mut,letterSpacing:3,textTransform:"uppercase",marginBottom:2},"Enter PIN"),
        div({fontSize:20,fontWeight:"bold",color:C.gold},member.name),
        hint && div({fontSize:14,color:C.red,marginTop:5},hint),
        busy && div({fontSize:13,color:C.amber,marginTop:3},"Checking..."),
      ),
      div({display:"flex",justifyContent:"center",gap:14,marginBottom:20,transform:shake?"translateX(-5px)":"none",transition:"transform .1s"},
        ...[0,1,2,3].map(i=>div({width:13,height:13,borderRadius:"50%",background:i<pin.length?C.gold:"transparent",border:`2px solid ${i<pin.length?C.gold:"#3a2e1a"}`,transition:"all .15s"}))
      ),
      div({display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9},
        ...[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>
          h("button",{key:i,onClick:()=>k==="⌫"?setPin(p=>p.slice(0,-1)):k!==""?press(String(k)):null,disabled:k===""||busy,

}

          todayEvs.forEach(e => {
            if(e.action === "Clock In") ci[e.member_id] = e;
            if(e.action === "Clock Out") delete ci[e.member_id];
          });
          setClockedIn(ci);
        }

      } catch(e) { /* silent fail */ }
    };

    const pollTimer = setInterval(poll, 6000);

    const t=setInterval(()=>{
      setNow(new Date());
      // Duty reminder check - every minute on Sundays
      const n2=new Date();
      if(n2.getDay()===0 && n2.getSeconds()<5){
        const mins=n2.getHours()*60+n2.getMinutes();
        const SLOTS=[
          {id:"gate-early",   start:450, label:"At the Gate (7:30 AM)"},
          {id:"camera-early", start:510, label:"Camera Watch (8:30 AM)"},
          {id:"gate-late",    start:540, label:"At the Gate (9:00 AM)"},
          {id:"camera-late",  start:600, label:"Camera Watch (10:00 AM)"},
          {id:"patrol",       start:450, label:"Patrol (Throughout Service)"},
        ];
        const todayR=findToday();
        if(todayR){
          SLOTS.forEach(slot=>{
            const diff=slot.start-mins;
            if(diff===30){
              // Check if current user is in this slot
              const pairs=todayR.slots[slot.id]||[];
              const inSlot=pairs.some(pair=>pair.includes(user?.id));
              if(inSlot){
                setDutyReminder({label:slot.label,mins:30});
                // Browser notification
                if(Notification && Notification.permission==="granted"){
                  new Notification("LSC Safety Unit",{body:"Your duty starts in 30 minutes: "+slot.label,icon:"/favicon.ico"});
                }
                setTimeout(()=>setDutyReminder(null),5*60*1000);
              }
            }
            if(diff===10){
              const pairs=todayR.slots[slot.id]||[];
              const inSlot=pairs.some(pair=>pair.includes(user?.id));
              if(inSlot){
                setDutyReminder({label:slot.label,mins:10});
                if(Notification && Notification.permission==="granted"){
                  new Notification("LSC Safety Unit",{body:"Your duty starts in 10 minutes: "+slot.label,icon:"/favicon.ico"});
                }
                setTimeout(()=>setDutyReminder(null),3*60*1000);
              }
            }
          });
        }
      }
    },1000);
    const n=new Date();const qMap={0:"Q1",1:"Q1",2:"Q1",3:"Q2",4:"Q2",5:"Q2",6:"Q3",7:"Q3",8:"Q3",9:"Q4",10:"Q4",11:"Q4"};
    const qk=`${qMap[n.getMonth()]}-${n.getFullYear()}`;if(QUARTERS[qk]){setRQ(qk);setRM(0);}
    return()=>{clearInterval(t);clearInterval(pollTimer);if(emTimer.current)clearTimeout(emTimer.current);};
  },[]);

  function stopAlarm(){
    if(alarmInterval.current){ clearInterval(alarmInterval.current); alarmInterval.current=null; }
    if(!isIOS()&&navigator.vibrate) navigator.vibrate(0);
  }
  stopAlarmFn.current = stopAlarm;

  function playAlarm(){
    // Stop any existing alarm first
    stopAlarm();
    // Play immediately then repeat every 3 seconds until dismissed
    function burst(){
      try{
        if(!audioCtx.current) audioCtx.current=new(window.AudioContext||window.webkitAudioContext)();
        const ctx=audioCtx.current;
        [0,.25,.5,.75,1.0].forEach(t=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);
          o.type="square";o.frequency.setValueAtTime(1200,ctx.currentTime+t);
          o.frequency.setValueAtTime(600,ctx.currentTime+t+.12);
          g.gain.setValueAtTime(.6,ctx.currentTime+t);
          g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.22);
          o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.25);
        });
      }catch(e){}
      if(!isIOS()&&navigator.vibrate) navigator.vibrate([500,100,500,100,500,100,800]);
    }
    burst();
    alarmInterval.current = setInterval(burst, 3000);
  }
  playAlarmFn.current = playAlarm;

      div({marginBottom:9},h("label",{style:S.label()},"Post Name"),inp(newPost.label,v=>setNewPost(p=>({...p,label:v})),"e.g. Prayer Coordinator")),
      div({marginBottom:9},h("label",{style:S.label()},"Time / Description"),inp(newPost.time,v=>setNewPost(p=>({...p,time:v})),"e.g. 8:00 AM – End of Service")),
      div({marginBottom:13},
        h("label",{style:S.label()},"Icon"),
        div({display:"flex",flexWrap:"wrap",gap:6},
          ...["🔒","🚶","📋","🔦","🎙️","🚑","🧯","📡","🏃","⛪"].map(ic=>
            h("button",{onClick:()=>setNewPost(p=>({...p,icon:ic})),style:{fontSize:20,background:newPost.icon===ic?"#1e1608":"transparent",border:`1px solid ${newPost.icon===ic?C.gold:C.bor}`,borderRadius:7,padding:"4px 8px",cursor:"pointer"}},ic)
          )
        )
      ),
      div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:8},
        h("button",{onClick:()=>setDutyPostModal(false),style:S.smBtn(C.mut,C.sur,C.bor)},"Cancel"),
        h("button",{onClick:()=>{
          if(!newPost.label.trim()) return;
          setCustomPosts(prev=>[...prev,{id:"custom_"+Date.now(),label:newPost.label,time:newPost.time,icon:newPost.icon,col:C.blue}]);
          setDutyPostModal(false);setNewPost({label:"",time:"",icon:"🔒"});
        },style:S.smBtn(C.blue,"#0a1218","#1a3a5a")},"+ Add Post")
      )
    ),
    addMemberModal&&h(Modal,{onClose:()=>setAddMemberModal(false)},
      div({fontSize:12,color:C.green,textTransform:"uppercase",letterSpacing:2,marginBottom:12},"Add New Team Member"),
      div({marginBottom:9},h("label",{style:S.label()},"Full Name"),inp(newMember.name,v=>setNewMember(p=>({...p,name:v})),"e.g. Emmanuel Okafor")),
      div({marginBottom:9},h("label",{style:S.label()},"Set PIN (4 digits)"),h("input",{type:"password",inputMode:"numeric",maxLength:4,value:newMember.pin,onChange:e=>setNewMember(p=>({...p,pin:e.target.value.replace(/\D/g,"")})),placeholder:"••••",style:{width:"100%",background:"#0a0908",border:`1px solid ${C.bor}`,borderRadius:7,padding:"10px 11px",color:C.txt,fontSize:23,fontFamily:"monospace",textAlign:"center",letterSpacing:8,boxSizing:"border-box"}})),
      newMemberMsg&&div({fontSize:14,color:newMemberMsg.includes("✓")?C.green:C.red,marginBottom:8,textAlign:"center"},newMemberMsg),
      div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:8},
        h("button",{onClick:()=>{setAddMemberModal(false);setNewMember({name:"",pin:""});setNewMemberMsg("");},style:S.smBtn(C.mut,C.sur,C.bor)},"Cancel"),
        h("button",{onClick:addNewMember,style:S.smBtn(C.green,"#0f2a0f","#3a8a3a")},"+ Add Member")
      )
    ),

    profileModal&&h(Modal,{onClose:()=>setProfileModal(null)},
      div({textAlign:"center",marginBottom:14},
        div({width:48,height:48,borderRadius:"50%",background:"#2a1f08",border:`2px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:"bold",color:C.gold,margin:"0 auto 8px"},profileModal.id),
        div({fontSize:19,fontWeight:"bold",color:"#f0e6c8"},profileModal.name),
        div({fontSize:13,color:C.mut},"Safety Team · LSC Abuja Safety Unit")
      ),
      !!clockedIn[profileModal.id]&&div({...S.card("#2a4a2a","#0f2a0f"),textAlign:"center",marginBottom:12},
        div({fontSize:14,color:C.green,fontWeight:"bold"},"● Currently On Duty"),
        div({fontSize:13,color:"#6a8a6a",marginTop:2},`${clockedIn[profileModal.id].role_label} · since ${fT(clockedIn[profileModal.id].timestamp)}`)
      ),
      absences[profileModal.id]&&div({...S.card("#4a4a18","#1a1a08"),marginBottom:12},
        div({fontSize:13,color:C.amber,fontWeight:"bold",marginBottom:2},"Absence Note"),
        div({fontSize:14,color:"#c0c060"},`${absences[profileModal.id].type} — ${absences[profileModal.id].note||"No reason"}`)
      ),
      h("button",{onClick:()=>setProfileModal(null),style:{...S.bigBtn(C.mut,C.sur,C.bor),marginTop:8}},"Close")
    ),

    settingsModal&&h(Modal,{onClose:()=>setSettingsModal(false)},
      div({fontSize:11,color:C.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:16},"⚙️ Settings"),

      // Profile Picture
      div({...S.card(C.bor,C.sur2),marginBottom:12},
        div({fontSize:13,fontWeight:"bold",color:C.txt,marginBottom:10},"Profile Picture"),
        div({display:"flex",alignItems:"center",gap:14},
          profilePics[user.id]
            ? h("img",{src:profilePics[user.id],style:{width:60,height:60,borderRadius:"50%",objectFit:"cover",border:`2px solid ${C.gold}`}})
            : div({width:60,height:60,borderRadius:"50%",background:"#1e1c14",border:`2px solid ${C.bor}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:C.mut},user.id),
          div({},
            div({fontSize:12,color:C.mut,marginBottom:8},"Your photo appears on the login screen"),
            div({display:"flex",gap:7},
              h("label",{style:{...S.smBtn(C.gold,"#1e1608",C.gold),cursor:"pointer",display:"inline-block"}},
                "📷 Upload Photo",
                h("input",{type:"file",accept:"image/*",style:{display:"none"},onChange:e=>{
                  const file=e.target.files[0];
                  if(!file) return;
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    const newPics={...profilePics,[user.id]:ev.target.result};
                    setProfilePics(newPics);
                    try{localStorage.setItem('lsc_profile_pics',JSON.stringify(newPics));}catch(err){}
                  };
                  reader.readAsDataURL(file);
                }})
              ),
              profilePics[user.id]&&h("button",{onClick:()=>{
                const newPics={...profilePics};
                delete newPics[user.id];
                setProfilePics(newPics);
                try{localStorage.setItem('lsc_profile_pics',JSON.stringify(newPics));}catch(err){}
              },style:S.smBtn(C.red,"#2a1a1a","#4a2a2a")},"Remove")
            )
          )
        )
      ),

      // Notifications
      div({...S.card(C.bor,C.sur2),marginBottom:12},
        div({fontSize:13,fontWeight:"bold",color:C.txt,marginBottom:6},"Notifications"),
        div({fontSize:12,color:C.mut,marginBottom:10},"Get alerts for messages, announcements and emergencies"),
        div({display:"flex",alignItems:"center",justifyContent:"space-between"},
          div({fontSize:13,color:notifEnabled?C.green:C.mut},notifEnabled?"Notifications ON":"Notifications OFF"),
          h("button",{onClick:async()=>{
            if(!notifEnabled){
              const perm=await Notification.requestPermission();
              if(perm==="granted"){
                setNotifEnabled(true);
                try{localStorage.setItem('lsc_notif','true');}catch(e){}
              } else {
                alert("Please allow notifications in your browser settings.");
              }
            } else {
              setNotifEnabled(false);
              try{localStorage.setItem('lsc_notif','false');}catch(e){}
            }
          },style:{...S.smBtn(notifEnabled?C.red:C.green,notifEnabled?"#2a1a1a":"#0f2a0f",notifEnabled?"#4a2a2a":"#3a8a3a"),padding:"8px 16px",fontWeight:"bold"}},notifEnabled?"Turn Off":"Turn On")
        )
      ),

      // Change PIN shortcut
      div({...S.card(C.bor,C.sur2),marginBottom:12},
        div({fontSize:13,fontWeight:"bold",color:C.txt,marginBottom:6},"Security"),
        h("button",{onClick:()=>{setSettingsModal(false);setPinModal(true);},style:{...S.bigBtn(C.mut,C.sur,C.bor)}},"🔒 Change My PIN")
      ),

      h("button",{onClick:()=>setSettingsModal(false),style:{...S.bigBtn(C.gold,"#1e1608"),marginTop:4}},"Done")
    ),
    coverModal&&h(Modal,{onClose:()=>setCoverModal(false)},
      div({fontSize:12,color:C.purple,textTransform:"uppercase",letterSpacing:2,marginBottom:12},"Request Cover"),
      div({fontSize:18,fontWeight:"bold",color:C.gold,marginBottom:12},user.name),
      h("label",{style:S.label()},"Reason"),
      inp(coverReason,setCoverReason,"e.g. Travelling, Family emergency..."),
      div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:13},
        h("button",{onClick:()=>setCoverModal(false),style:S.smBtn(C.mut,C.sur,C.bor)},"Cancel"),
        h("button",{onClick:submitCover,style:S.smBtn(C.purple,"#120a1a","#5a3a8a")},"🔄 Send Request")
      )
    ),

    div({textAlign:"center",padding:"10px 8px 14px",fontSize:12,borderTop:"1px solid #161410"},
      div({color:"#1a1810",marginBottom:4},'"Unless the LORD watches over the city, the watchmen stand guard in vain." — Psalm 127:1'),
      div({color:"#2a2010",fontSize:10,letterSpacing:1},"Built by Obaoye Samuel · Adullam Systems · LSC Abuja Safety Unit")
    )
  ); // end App return
} // end App

// ── MOUNT ─────────────────────────────────────────────────────────
// Mount directly - DOM is already ready since our script is at end of body
try {
  const container = document.getElementById('root');
  const root = ReactDOM.createRoot(container);
  root.render(React.createElement(App));
  // Hide splash after mount
  var sp = document.getElementById('sp');
  if(sp){ setTimeout(function(){ sp.classList.add('gone'); setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); },600); },400); }
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="font-family:Georgia,serif;color:#cd7a7a;text-align:center;padding:40px;background:#0a0a0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div style="font-size:15px;font-weight:bold;margin-bottom:8px;color:#cd7a7a">Startup Error</div><div style="font-size:11px;color:#7a6a4a;margin-bottom:20px;max-width:320px">' + e.message + '</div><button onclick="location.reload()" style="background:#1e1608;border:1px solid #C8A96E;color:#C8A96E;padding:10px 24px;border-radius:9px;cursor:pointer;font-size:13px">Reload</button></div>';
  var sp = document.getElementById('sp');
  if(sp){ sp.classList.add('gone'); }
}

</script>
</body>
</html>
